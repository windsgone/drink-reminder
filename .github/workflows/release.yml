name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        id: package
        env:
          MARKETING_VERSION_OVERRIDE: ${{ github.ref_name }}
          BUILD_NUMBER_OVERRIDE: ${{ github.run_number }}
        run: |
          marketing_version="${MARKETING_VERSION_OVERRIDE#v}"
          artifact_path="$(MARKETING_VERSION_OVERRIDE="${marketing_version}" BUILD_NUMBER_OVERRIDE="${BUILD_NUMBER_OVERRIDE}" scripts/build-release-zip.sh Release)"
          echo "artifact_path=${artifact_path}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.artifact_path }}
          generate_release_notes: true
          body: |
            Download the zip, extract it, and move `Drink Reminder.app` into your Applications folder.

            Note: this package is unsigned by default, so macOS Gatekeeper may require opening once via right-click -> Open.
